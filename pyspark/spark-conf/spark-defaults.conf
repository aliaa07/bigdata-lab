# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Example:
spark.master						yarn
spark.eventLog.enabled				true
spark.submit.deployMode				client
spark.eventLog.dir					hdfs://namenode:9000/user/jovyan/spark-history
spark.history.fs.logDirectory		hdfs://namenode:9000/user/jovyan/spark-history
spark.serializer					org.apache.spark.serializer.KryoSerializer
# spark.driver.memory				5g
# spark.executor.extraJavaOptions	-XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"
spark.eventLog.rolling.enabled		true
spark.eventLog.closeFileOnStop		true
spark.eventLog.endRollingInterval	1s

# Match your actual HDFS replication factor
spark.hadoop.dfs.replication		1
spark.executor.cores				1
spark.executor.memory				1g
#spark.executor.instances			3

spark.sql.catalogImplementation		hive
spark.sql.hive.metastore.uris		thrift://hive-metastore:9083
spark.sql.warehouse.dir				hdfs://namenode:9000/user/hive/warehouse