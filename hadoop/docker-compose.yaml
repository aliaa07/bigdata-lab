# ============================================================
# HADOOP CLUSTER — docker-compose.yaml
# Tuned for: Windows 11 + WSL2, 10 cores / 14 threads, 16GB RAM
#
# Resource limits below are LAPTOP-SIZED for exploration/lab use.
# Production-scale equivalents are commented directly beneath each
# limit — uncomment and resize when you move to real hardware.
#
# NOTE: this assumes a .wslconfig capping WSL2 at ~12GB RAM / 10 vCPU,
# leaving headroom for Windows + the WSL2 kernel itself.
# ============================================================

services:
  namenode-init:
    image: apache/hadoop:3.5.0
    container_name: namenode-init
    user: root
    restart: no
    command: chown -R hadoop:users /tmp
    networks:
      - bigdata
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
      - namenode_storage:/tmp/hadoop-hadoop/dfs/name

  datanode-init:
    image: apache/hadoop:3.5.0
    container_name: datanode-init
    user: root
    restart: no
    command: chown -R hadoop:users /tmp
    networks:
      - bigdata
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
      - datanode_storage:/tmp/hadoop-hadoop/dfs/data


  namenode:
    image: apache/hadoop:3.5.0
    container_name: namenode
    command: hdfs namenode
    restart: unless-stopped
    depends_on:
      namenode-init: 
        condition: service_completed_successfully
    ports:
      - "9870:9870"
      - "9000:9000"
    networks:
      - bigdata
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
      - namenode_storage:/tmp/hadoop-hadoop/dfs/name
    # --- Resource limits (lab) ---
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.5
    # --- Production reference (size to real fsimage/edit-log load) ---
    # mem_limit: 8g
    # mem_reservation: 4g
    # cpus: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://namenode:9870/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  datanode:
    image: apache/hadoop:3.5.0
    container_name: datanode1
    command: hdfs datanode -fs hdfs://namenode:9000
    restart: unless-stopped
    # user: root
    depends_on:
      datanode-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
    networks:
      - bigdata
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
      - datanode_storage:/tmp/hadoop-hadoop/dfs/data
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # mem_limit: 4g
    # mem_reservation: 2g
    # cpus: 1.5
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f DataNode || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  resourcemanager:
    image: apache/hadoop:3.5.0
    container_name: resourcemanager
    command: yarn resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # mem_limit: 4g
    # mem_reservation: 2g
    # cpus: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://resourcemanager:8088/ws/v1/cluster/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nodemanager:
    image: apache/hadoop:3.5.0
    command: yarn nodemanager
    restart: unless-stopped
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop
    depends_on:
      resourcemanager:
        condition: service_healthy
      namenode:
        condition: service_healthy
    networks:
      - bigdata

    mem_limit: 3g
    mem_reservation: 2g
    cpus: 1
    # mem_limit: 16g
    # cpus: 6
    deploy:
      replicas: 4
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f NodeManager || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

networks:
  bigdata:
    name: bigdata
    driver: bridge
    external: true

volumes:
  namenode_storage:
    name: bigdata_namenode_storage
  datanode_storage:
    name: bigdata_datanode_storage